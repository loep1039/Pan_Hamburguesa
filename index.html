<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión Pan Hamburguesa - Fernando Araujo</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            /* ESQUEMA DE COLORES: CAFÉ/DORADO PARA HAMBURGUESA */
            --primario-hamburguesa: #8d6e63; 
            --cafe-oscuro: #5d4037;
            --fondo-gris: #f8faf9;
            --texto-oscuro: #1a202c;
            --blanco: #ffffff;
            --gris-claro: #edf2f7;
            --cafe-claro: #efebe9; 
            --dorado-borde: #d7ccc8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e2e8f0;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .phone-container {
            width: 100%;
            max-width: 400px;
            background: var(--blanco);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
        }

        .status-bar {
            font-size: 0.65rem;
            padding: 8px;
            text-align: center;
            background: #f1f5f9;
            color: #718096;
            font-weight: 600;
        }

        .header-card {
            background-color: var(--primario-hamburguesa);
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 20px 20px 0 0;
            margin: 10px;
        }

        .header-card p { margin: 0; font-size: 0.65rem; opacity: 0.9; text-transform: uppercase;}
        .header-card h1 { margin: 5px 0 0; font-size: 1.3rem; letter-spacing: 2px; font-weight: 800; text-transform: uppercase; }

        .summary {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 10px 20px 20px;
        }

        .card {
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid var(--gris-claro);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card.cost { background-color: var(--cafe-claro); border: 1.5px solid var(--dorado-borde); }
        .card.quantity { grid-column: 1 / -1; margin-bottom: 5px; }

        .label-mini { font-size: 0.6rem; color: #a0aec0; text-transform: uppercase; font-weight: bold; margin-bottom: 2px; }
        .label-mini.cost-label { color: var(--cafe-oscuro); }

        .card-val { font-size: 1.2rem; font-weight: bold; color: var(--texto-oscuro); }
        .card-val.cost-val { color: var(--cafe-oscuro); }

        .qty-input-small {
            width: 65px;
            border: 2px solid var(--dorado-borde);
            background: #ffffff;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--texto-oscuro);
            text-align: center;
            padding: 5px;
            outline: none;
            margin-left: 5px;
        }

        .list { padding: 10px 20px; min-height: 200px; }
        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f1f5f9;
        }
        .ing-name { font-weight: 700; font-size: 0.85rem; color: #2d3748; }
        .ing-pct { font-size: 0.7rem; color: #cbd5e0; font-weight: normal; margin-left: 4px; }
        .ing-results { text-align: right; }
        .ing-qty { display: block; font-weight: 700; font-size: 0.9rem; color: var(--texto-oscuro); }
        .ing-price { font-size: 0.65rem; color: var(--primario-hamburguesa); font-weight: bold; }

        .footer { padding: 20px; text-align: center; }
        .btn-copy {
            background-color: var(--primario-hamburguesa);
            color: white;
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            font-size: 0.8rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 12px rgba(141,110,99,0.3);
            transition: background-color 0.2s;
        }
        .btn-copy:hover { background-color: var(--cafe-oscuro); }
        
        .copy-success {
            font-size: 0.7rem;
            color: var(--cafe-oscuro);
            margin-top: 5px;
            display: none;
        }
    </style>
</head>
<body>

<div class="phone-container">
    <div id="status" class="status-bar"><i class="fas fa-sync fa-spin"></i> Conectando...</div>
    
    <div class="header-card">
        <p>SISTEMA DE GESTIÓN - FERNANDO ARAUJO</p>
        <h1>HAMBURGUESA</h1>
    </div>

    <div class="summary">
        <div class="card quantity">
            <label class="label-mini" for="inputPanes">Cantidad de Panes:</label>
            <div style="display:flex; align-items:center; justify-content:center;">
                <input type="number" id="inputPanes" class="qty-input-small" value="1" min="1" oninput="calcular()">
                <span class="card-val" style="margin-left:5px;">unid.</span>
            </div>
        </div>
        <div class="card cost">
            <span class="label-mini cost-label">Costo Insumos</span>
            <span id="resCosto" class="card-val cost-val">$ 0.00</span>
        </div>
        <div class="card">
            <span class="label-mini">Masa Total</span>
            <span id="resMasa" class="card-val">0 g</span>
        </div>
    </div>

    <div class="list" id="listaIngredientes"></div>

    <div class="footer">
        <button class="btn-copy" onclick="copiarAlPortapapeles()">
            <i class="fas fa-copy"></i> Copiar para WhatsApp
        </button>
        <span id="copyMessage" class="copy-success"><i class="fas fa-check"></i> ¡Copiado con éxito!</span>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyK0o_LRZg2b75mrPzU63l6bPjFac01LWs3DA5tFVXJ3yR97DbBek1zEVD7JJySiDas/exec";

    // Receta extraída de image_0e67a9.png
    const RECETA = {
        nombre: "Pan de Hamburguesa",
        harinaPorUnidad: 61.0, 
        items: [
            { nombre: "Harina", pct: 100.0, precioKg: 0 },
            { nombre: "Agua", pct: 39.0, precioKg: 0 },
            { nombre: "Levadura", pct: 2.0, precioKg: 0 },
            { nombre: "Sal", pct: 1.3, precioKg: 0 },
            { nombre: "Azúcar", pct: 11.7, precioKg: 0 },
            { nombre: "Margarina", pct: 13.3, precioKg: 0 }, // Identificado como Mantequilla en hoja
            { nombre: "Huevos", pct: 6.7, precioKg: 0 },
            { nombre: "Vainilla", pct: 0.7, precioKg: 0 }
        ]
    };

    async function sincronizarPrecios() {
        const statusEl = document.getElementById('status');
        try {
            const response = await fetch(WEB_APP_URL);
            const data = await response.json();
            
            RECETA.items.forEach(ing => {
                const nombreBuscar = ing.nombre === "Margarina" ? "margarina" : ing.nombre.toLowerCase();
                const encontrado = data.find(p => p.nombre.toLowerCase().trim() === nombreBuscar);
                if (encontrado) {
                    ing.precioKg = encontrado.precioKg;
                }
            });

            statusEl.innerHTML = '<i class="fas fa-check-circle"></i> Precios activo';
            statusEl.style.color = "#8d6e63";
            calcular(); 
        } catch (error) {
            statusEl.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Usando precios base (0)';
            statusEl.style.color = "#e53e3e";
            calcular();
        }
    }

    function calcular() {
        const panes = parseFloat(document.getElementById('inputPanes').value) || 0;
        const contenedor = document.getElementById('listaIngredientes');
        contenedor.innerHTML = '';

        let masaTotal = 0;
        let costoTotal = 0;

        RECETA.items.forEach(ing => {
            const gramos = (RECETA.harinaPorUnidad * panes) * (ing.pct / 100);
            
            // LÓGICA ESPECIAL PARA HUEVOS (Divisor 1500)
            let divisor = (ing.nombre === "Huevos") ? 1500 : 1000;
            const costo = (gramos / divisor) * ing.precioKg;

            masaTotal += gramos;
            costoTotal += costo;

            contenedor.innerHTML += `
                <div class="item">
                    <div class="ing-info">
                        <span class="ing-name">${ing.nombre} <span class="ing-pct">(${ing.pct}%)</span></span>
                    </div>
                    <div class="ing-results">
                        <span class="ing-qty">${gramos.toFixed(1)} g</span>
                        <span class="ing-price">$ ${costo.toFixed(3)}</span>
                    </div>
                </div>
            `;
        });

        document.getElementById('resMasa').innerText = `${masaTotal.toFixed(1)} g`;
        document.getElementById('resCosto').innerText = `$ ${costoTotal.toFixed(2)}`;
    }

    function copiarAlPortapapeles() {
        const panes = document.getElementById('inputPanes').value;
        const masaTotalStr = document.getElementById('resMasa').innerText;
        const costoTotalStr = document.getElementById('resCosto').innerText;

        let textoCopiar = `*${RECETA.nombre.toUpperCase()}* - *${costoTotalStr}*\n`;
        textoCopiar += `CANTIDAD: ${panes} panes\n`;
        textoCopiar += `MASA TOTAL: ${masaTotalStr}\n`;
        textoCopiar += `---\n`;

        RECETA.items.forEach(ing => {
            const gramos = (RECETA.harinaPorUnidad * panes) * (ing.pct / 100);
            textoCopiar += `${ing.nombre}: ${gramos.toFixed(1)}g\n`;
        });

        const el = document.createElement('textarea');
        el.value = textoCopiar;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);

        const messageEl = document.getElementById('copyMessage');
        messageEl.style.display = 'block';
        setTimeout(() => messageEl.style.display = 'none', 2000);
    }

    window.onload = sincronizarPrecios;
</script>

</body>
</html>
